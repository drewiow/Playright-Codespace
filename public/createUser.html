<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Automation Runner – Create User</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/createUser.css" />
    <link rel="stylesheet" href="./styles/header.css" />
</head>

<body>
    <header class="header">
        <img class="logo" src="./images/optum-logo.png" alt="Optum">
        <div class="title" id="breadcrumb">
            Automation Runner → Choose a Product
        </div>
        <div id="userMenu" class="user-menu hidden">
            <button id="userDisplay" class="user-display">
                <div id="userAvatar" class="user-avatar"></div>
                <span id="userNameLabel"></span>
                <span class="chevron">▾</span>
            </button>

            <div id="userDropdown" class="user-dropdown hidden">
                <a href="/createUser.html" class="dropdown-item">
                    <span class="item-icon">➕</span> Create User
                </a>
                <a href="/runHistory.html" class="dropdown-item">
                    <span class="item-icon">📜</span> Run History
                </a>
                <button id="logoutBtn" class="dropdown-item logout">
                    <span class="item-icon">🚪</span> Logout
                </button>
            </div>
        </div>
    </header>

    <main class="layout-landing">

        <div class="left-column" style="width:500px">

            <h1 class="page-title">Encrypt your variables</h1>

            <form id="envForm">

                <!-- NEW: Identity fields -->
                <div class="field">
                    <label>User ID</label>
                    <input type="text" id="userId" placeholder="e.g. drew.clarke" required>
                </div>

                <div class="field">
                    <label>Display Name</label>
                    <input type="text" id="displayName" placeholder="e.g. Drew Clarke" required>
                </div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="e.g. drew.clarke@optum.com" required>
                </div>

                <div class="field">
                    <label>Roles (comma separated)</label>
                    <input type="text" id="roles" placeholder="e.g. admin,user" required>
                </div>

                <!-- Existing fields -->
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Your username for logging into your website" required>
                </div>

                <div class="field">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Your password for loggin into your website"
                        required>
                </div>

                <div class="field">
                    <label>6 letter Security Word</label>
                    <input type="password" id="securityWord"
                        placeholder="Pharmoutcomes specific, leave blank for 14Fidh">
                </div>

                <div class="field">
                    <label>Secret MFA Key</label>
                    <input type="text" id="secretKey"
                        placeholder="You might need to request this from engineering, or use the code for 'manual' entry"
                        required>
                </div>

                <div class="field">
                    <label>Master Decrypt Password</label>
                    <input type="password" id="masterPassword"
                        placeholder="Make this a secure password different to anything else" required>
                </div>

                <button type="submit" class="button-primary">Generate env.enc</button>
            </form>

            <p id="status"></p>
        </div>
    </main>
    <script src="./scripts/createUser.js" type="module"></script>

</body>

</html>
