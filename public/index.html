<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Automation Runner – Home</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/index.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/login.css" />
</head>

<body>
    <div class="app">
        <header class="header">
            <img class="logo" src="./images/optum-logo.png" alt="Optum">
            <div class="title" id="breadcrumb">
                Automation Runner → Choose a Product
            </div>
            <div id="userMenu" class="user-menu hidden">
                <button id="userDisplay" class="user-display">
                    <div id="userAvatar" class="user-avatar"></div>
                    <span id="userNameLabel"></span>
                    <span class="chevron">▾</span>
                </button>

                <div id="userDropdown" class="user-dropdown hidden">
                    <a href="/createUser.html" class="dropdown-item">
                        <span class="item-icon">➕</span> Create User
                    </a>
                    <a href="/runHistory.html" class="dropdown-item">
                        <span class="item-icon">📜</span> Run History
                    </a>
                    <button id="logoutBtn" class="dropdown-item logout">
                        <span class="item-icon">🚪</span> Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Backdrop -->
        <div id="loginBackdrop" class="modal-backdrop hidden"></div>

        <!-- Login Modal -->
        <div id="loginModal" class="modal hidden">
            <h2 class="modal-title">🔐 Secure Login</h2>

            <p class="modal-subtitle">
                Unlock the Automation Runner using your encrypted environment file.
            </p>

            <form id="loginForm">

                <div class="field">
                    <label for="envFile">Encrypted environment file</label>
                    <input type="file" id="envFile" accept=".enc" required />
                    <small class="help-text">
                        Select the env.enc file provided to you.
                    </small>
                </div>

                <div class="field">
                    <label for="passphrase">Passphrase</label>
                    <input type="password" id="passphrase" placeholder="Enter your passphrase" required
                        autocomplete="current-password" />
                    <small class="help-text">
                        This passphrase is required to decrypt your credentials.
                    </small>
                </div>

                <button type="submit" class="button-primary" id="unlockBtn">
                    Unlock
                </button>

                <div id="loginError" class="error hidden"></div>

            </form>
        </div>

        <!-- Main Content -->
        <main class="layout-landing">
            <h1 class="page-title">Choose a Product</h1>
            <div class="product-grid"></div>
            <div class="script-panels">
                <div id="scriptPicker" class="hidden">
                    <h2>Select a script</h2>
                    <div id="scriptGrid" class="script-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="./scripts/index.js" type="module"></script>
</body>

</html>
